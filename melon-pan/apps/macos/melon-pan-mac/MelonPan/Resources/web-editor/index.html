<!doctype html>
<html>
<head>
<meta charset="utf-8">
<!--
  Editor host for the macOS WKWebView. Loads `editor.js` as a sibling
  resource. The Swift side calls window.MelonPanEditor.init({})
  and window.MelonPanEditor.loadBuffer(text) over WKScriptMessageHandler.

  CSP: 'unsafe-inline' for the bootstrap script + the editor.js bundle.
  No remote sources — every URL the page touches is file:// inside the
  app bundle. The editor.js bundle never makes outbound network calls.
-->
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self' 'unsafe-inline'; style-src 'unsafe-inline';">
<style>
html, body, #editor { height: 100%; }
body { margin: 0; min-height: 100vh; background: #f7f2e8; color: #28231d; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; }
.shell { box-sizing: border-box; height: 100%; padding: 28px 34px; display: grid; grid-template-rows: 1fr; }
.editor-frame { min-height: 0; overflow: hidden; border: 1px solid #d6c8b5; border-radius: 18px; background: #fffaf0; box-shadow: 0 18px 44px rgba(70, 50, 20, .10); }
#status { position: fixed; right: 18px; bottom: 14px; padding: 4px 8px; border-radius: 999px; background: rgba(40, 35, 29, .80); color: #fffaf0; font: 12px/1 -apple-system, sans-serif; }
@media (prefers-color-scheme: dark) {
  body { background: #1e1a16; color: #f2e7d5; }
  .editor-frame { background: #28231e; border-color: #4a4035; }
}
</style>
</head>
<body>
<div class="shell">
  <div class="editor-frame"><div id="editor"></div></div>
  <div id="status">Loading…</div>
</div>
<script src="editor.js"></script>
<script>
  // Boot the editor. Swift fills in the buffer via loadBuffer once
  // didFinish fires (see WebViewHost.Coordinator.flushIfReady).
  window.MelonPanEditor.init({ text: "", vim: false });
  window.MelonPanEditor.focus && window.MelonPanEditor.focus();
  document.getElementById("status").textContent = "Ready";
</script>
</body>
</html>
