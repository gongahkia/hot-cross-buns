# xcodegen manifest for the macOS Melon Pan shell.
#
# Run `xcodegen generate` from this directory to produce
# MelonPan.xcodeproj. CI / contributors regenerate; the .xcodeproj is
# .gitignored to keep diffs sane.
#
# Build pipeline:
#   1. xcodegen generate
#   2. xcodebuild (or open MelonPan.xcodeproj)
#
# The app links the Rust FFI static library from MelonPan/Build. The
# target pre-build script refreshes that library before Swift links so
# Xcode builds do not accidentally run stale Rust core code.

name: MelonPan
options:
  bundleIdPrefix: com.gongahkia
  deploymentTarget:
    macOS: "13.0"
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    SDKROOT: macosx
    SUPPORTED_PLATFORMS: macosx
    CLANG_ENABLE_MODULES: YES
    ENABLE_APP_INTENTS_METADATA_EXTRACTION: NO
    SWIFT_OBJC_BRIDGING_HEADER: MelonPan/Bridge/MelonPan-Bridging-Header.h
    HEADER_SEARCH_PATHS: $(SRCROOT)/../../../crates/melon-pan-mac-ffi/include
    OTHER_LDFLAGS: $(SRCROOT)/MelonPan/Build/libmelon_pan_mac_ffi.a -framework Security -framework SystemConfiguration -framework CoreSpotlight
    LIBRARY_SEARCH_PATHS: $(SRCROOT)/MelonPan/Build

schemes:
  MelonPan:
    build:
      targets:
        MelonPan: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - MelonPanTests
  MelonPanTests:
    build:
      targets:
        MelonPanTests: test
    test:
      config: Debug
      targets:
        - MelonPanTests
  MelonPanUITests:
    build:
      targets:
        MelonPanUITests: test
    test:
      config: Debug
      targets:
        - MelonPanUITests

targets:
  MelonPan:
    type: application
    platform: macOS
    preBuildScripts:
      - name: Build Rust static library
        script: |
          "$SRCROOT/scripts/build-rust-staticlib.sh" "$CONFIGURATION"
        basedOnDependencyAnalysis: false
    sources:
      - path: MelonPan
        excludes:
          - "Bridge/MelonPan-Bridging-Header.h"
          - "Build/**"
          - "Resources/**"
      - path: MelonPan/Bridge/MelonPan-Bridging-Header.h
        buildPhase: none
      - path: MelonPan/Resources/web-editor
        buildPhase: resources
        type: folder
      - path: MelonPan/Resources/help
        buildPhase: resources
        type: folder
    info:
      path: MelonPan/Info.plist
      properties:
        CFBundleName: Melon Pan
        CFBundleDisplayName: Melon Pan
        CFBundleIdentifier: com.gongahkia.MelonPan
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: "13.0"
        NSHighResolutionCapable: true
        NSCoreSpotlightContinuation: true
        UTImportedTypeDeclarations:
          - UTTypeIdentifier: net.daringfireball.markdown
            UTTypeDescription: Markdown Document
            UTTypeConformsTo:
              - public.text
              - public.plain-text
            UTTypeTagSpecification:
              public.filename-extension:
                - md
                - markdown
              public.mime-type: text/markdown
        # Required because we open a loopback OAuth callback on
        # 127.0.0.1; without ATS exceptions WKWebView still works
        # for HTTPS but the loopback http:// callback would be
        # blocked at session level. Localhost is allow-listed.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        CFBundleURLTypes:
          - CFBundleURLName: com.gongahkia.MelonPan.deeplink
            CFBundleTypeRole: Viewer
            CFBundleURLSchemes:
              - melonpan
    entitlements:
      path: MelonPan/MelonPan.entitlements
      properties:
        com.apple.security.network.client: true
        com.apple.security.network.server: true
        com.apple.security.files.user-selected.read-write: true

  MelonPanTests:
    type: bundle.unit-test
    platform: macOS
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    sources:
      - path: MelonPanTests
    dependencies:
      - target: MelonPan

  MelonPanUITests:
    type: bundle.ui-testing
    platform: macOS
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    sources:
      - path: MelonPanUITests
    dependencies:
      - target: MelonPan
