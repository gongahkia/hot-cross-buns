name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  CARGO_NET_RETRY: "5"
  RUST_BACKTRACE: "1"

jobs:
  workspace:
    name: workspace (no GTK) - ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup component add rustfmt clippy

      - name: Cache cargo registry + git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo build (workspace, no GTK)
        run: cargo build --workspace --exclude melon-pan-gtk --locked

      - name: cargo test (workspace, no GTK)
        run: cargo test --workspace --exclude melon-pan-gtk --locked

      - name: cargo clippy (workspace, no GTK)
        run: cargo clippy --workspace --exclude melon-pan-gtk --locked --all-targets -- -D warnings

  gtk:
    name: gtk app build - ubuntu-24.04
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install GNOME dev libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-4-dev \
            libadwaita-1-dev \
            libwebkitgtk-6.0-dev \
            libsecret-1-dev \
            pkg-config \
            libsecret-tools

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal

      - name: Cache cargo registry + git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ubuntu-24.04-gtk-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: cargo build (gtk app)
        run: cargo build -p melon-pan-gtk --locked

  fedora:
    name: workspace (no GTK) - fedora 40
    runs-on: ubuntu-24.04
    container: fedora:40
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          dnf install -y rust cargo git pkgconf-pkg-config gcc

      - name: cargo build (workspace, no GTK)
        run: cargo build --workspace --exclude melon-pan-gtk --locked

      - name: cargo test (workspace, no GTK)
        run: cargo test --workspace --exclude melon-pan-gtk --locked

  flatpak-vendor:
    name: vendor cargo sources for flatpak
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal
      - name: Cache cargo registry + git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ubuntu-vendor-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Ensure Cargo.lock is current
        run: cargo generate-lockfile
      - name: Run vendor-cargo.sh
        run: ./packaging/flatpak/vendor-cargo.sh
      - name: Upload generated-sources.json
        uses: actions/upload-artifact@v4
        with:
          name: flatpak-generated-sources
          path: packaging/flatpak/generated-sources.json
          if-no-files-found: error

  editor-bundle:
    name: web editor bundle
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: apps/linux/web-editor
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/linux/web-editor/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Verify bundle is up to date with src
        run: |
          if ! git diff --quiet -- dist/editor.js; then
            echo "::error::dist/editor.js is out of sync with src/. Re-run 'npm run build' and commit."
            git diff -- dist/editor.js | head -30
            exit 1
          fi
