<svg xmlns="http://www.w3.org/2000/svg" width="920" height="184" viewBox="0 0 920 184" role="img" aria-labelledby="title desc">
  <title id="title">macOS Open Anyway warning</title>
  <desc id="desc">Illustration of the macOS Privacy and Security message saying Hot Cross Buns was blocked to protect your Mac, with an Open Anyway button.</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-30%" width="120%" height="180%">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#11111b" flood-opacity=".12"/>
    </filter>
    <linearGradient id="panel" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#f7f7f8"/>
      <stop offset="1" stop-color="#f0f0f2"/>
    </linearGradient>
  </defs>

  <rect width="920" height="184" fill="none"/>
  <g filter="url(#shadow)">
    <rect x="1" y="4" width="918" height="176" rx="22" fill="url(#panel)"/>
    <text x="21" y="51" fill="#26272b" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="29" font-weight="500">
      "Hot Cross Buns" was blocked to protect your Mac.
    </text>
    <rect x="686" y="16" width="214" height="48" rx="11" fill="#e4e4e6"/>
    <text x="793" y="51" text-anchor="middle" fill="#202124" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="500">
      Open Anyway
    </text>
    <line x1="20" y1="86" x2="900" y2="86" stroke="#dfdfe2"/>
    <text x="21" y="129" fill="#747579" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24">
      <tspan x="21" dy="0">Apple could not verify "Hot Cross Buns" is free of malware that may harm your Mac</tspan>
      <tspan x="21" dy="28">or compromise your privacy.</tspan>
    </text>
  </g>
</svg>
