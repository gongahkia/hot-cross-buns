name: Hot Cross Buns MacOS DMG Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  macos-dmg:
    name: macOS DMG
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Prepare Google OAuth release config
        working-directory: apps/apple
        env:
          GOOGLE_MACOS_CLIENT_ID: ${{ secrets.GOOGLE_MACOS_CLIENT_ID }}
          GOOGLE_MACOS_REVERSED_CLIENT_ID: ${{ secrets.GOOGLE_MACOS_REVERSED_CLIENT_ID }}
          GOOGLE_MAPS_EMBED_API_KEY: ${{ secrets.GOOGLE_MAPS_EMBED_API_KEY }}
        run: |
          if [[ -z "$GOOGLE_MACOS_CLIENT_ID" || -z "$GOOGLE_MACOS_REVERSED_CLIENT_ID" ]]; then
            if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
              echo "Tag releases require GOOGLE_MACOS_CLIENT_ID and GOOGLE_MACOS_REVERSED_CLIENT_ID secrets." >&2
              exit 1
            fi
            echo "Google OAuth release secrets not configured; continuing with blank defaults."
            exit 0
          fi

          cat > Configuration/GoogleOAuth.local.xcconfig <<EOF
          GOOGLE_MACOS_CLIENT_ID = $GOOGLE_MACOS_CLIENT_ID
          GOOGLE_MACOS_REVERSED_CLIENT_ID = $GOOGLE_MACOS_REVERSED_CLIENT_ID
          GOOGLE_MAPS_EMBED_API_KEY = $GOOGLE_MAPS_EMBED_API_KEY
          EOF

      - name: Import Developer ID certificate
        env:
          MACOS_DEVELOPER_ID_P12_BASE64: ${{ secrets.MACOS_DEVELOPER_ID_P12_BASE64 }}
          MACOS_DEVELOPER_ID_P12_PASSWORD: ${{ secrets.MACOS_DEVELOPER_ID_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [[ -z "$MACOS_DEVELOPER_ID_P12_BASE64" ]]; then
            echo "No Developer ID certificate configured; building unsigned DMG."
            exit 0
          fi

          KEYCHAIN_PASSWORD="${KEYCHAIN_PASSWORD:-temporary-release-keychain-password}"
          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/release-signing.keychain-db"

          echo "$MACOS_DEVELOPER_ID_P12_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$MACOS_DEVELOPER_ID_P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Build DMG
        env:
          CODE_SIGN_IDENTITY: ${{ secrets.MACOS_DEVELOPER_ID_APPLICATION }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_SPECIFIC_PASSWORD: ${{ secrets.APP_SPECIFIC_PASSWORD }}
          NOTARIZE: ${{ secrets.NOTARIZE_MACOS_DMG }}
          REQUIRE_GOOGLE_OAUTH_FOR_RELEASE: ${{ startsWith(github.ref, 'refs/tags/v') && '1' || '0' }}
        run: scripts/package-macos-dmg.sh

      - name: Create latest-download DMG alias
        run: |
          VERSIONED_DMG=$(find build/apple -maxdepth 1 -type f -name 'HotCrossBuns-*-macOS.dmg' | head -n 1 || true)
          if [[ -z "$VERSIONED_DMG" ]]; then
            echo "Versioned DMG not found in build/apple" >&2
            exit 1
          fi
          cp "$VERSIONED_DMG" build/apple/HotCrossBuns-macOS.dmg

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: HotCrossBuns-macOS-DMG
          path: build/apple/*.dmg
          if-no-files-found: error

      - name: Prepare appcast inputs
        if: ${{ secrets.SPARKLE_PRIVATE_KEY != '' }}
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          mkdir -p "$RUNNER_TEMP/sparkle"
          printf '%s' "$SPARKLE_PRIVATE_KEY" > "$RUNNER_TEMP/sparkle/ed_private_key"
          chmod 600 "$RUNNER_TEMP/sparkle/ed_private_key"

          mkdir -p "$RUNNER_TEMP/appcast-source"
          cp build/apple/HotCrossBuns-*-macOS.dmg "$RUNNER_TEMP/appcast-source/"
          cp docs/appcast/appcast.xml "$RUNNER_TEMP/appcast-source/appcast.xml"

      - name: Locate Sparkle generate_appcast
        if: ${{ secrets.SPARKLE_PRIVATE_KEY != '' }}
        id: sparkle_tool
        run: |
          TOOL=$(find ~/Library/Developer/Xcode/DerivedData -type f -name generate_appcast 2>/dev/null | head -n 1 || true)
          if [[ -z "$TOOL" ]]; then
            echo "generate_appcast not found in DerivedData; install Sparkle separately." >&2
            exit 1
          fi
          echo "tool=$TOOL" >> "$GITHUB_OUTPUT"

      - name: Generate appcast
        if: ${{ secrets.SPARKLE_PRIVATE_KEY != '' }}
        run: |
          "${{ steps.sparkle_tool.outputs.tool }}" \
            --ed-key-file "$RUNNER_TEMP/sparkle/ed_private_key" \
            --download-url-prefix "https://gongahkia.github.io/hot-cross-buns/" \
            "$RUNNER_TEMP/appcast-source"

      - name: Deploy to GitHub Pages
        if: ${{ secrets.SPARKLE_PRIVATE_KEY != '' }}
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ${{ runner.temp }}/appcast-source
          keep_files: true
          commit_message: "release: publish ${{ github.ref_name }}"

      - name: Attach DMG to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/apple/*.dmg
          generate_release_notes: true
