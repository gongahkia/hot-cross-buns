name: Hot Cross Buns MacOS DMG Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  macos-dmg:
    name: macOS DMG
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Prepare Google OAuth release config
        working-directory: apps/apple
        env:
          GOOGLE_MACOS_CLIENT_ID: ${{ secrets.GOOGLE_MACOS_CLIENT_ID }}
          GOOGLE_MACOS_REVERSED_CLIENT_ID: ${{ secrets.GOOGLE_MACOS_REVERSED_CLIENT_ID }}
          GOOGLE_MAPS_EMBED_API_KEY: ${{ secrets.GOOGLE_MAPS_EMBED_API_KEY }}
        run: |
          if [[ -z "$GOOGLE_MACOS_CLIENT_ID" || -z "$GOOGLE_MACOS_REVERSED_CLIENT_ID" ]]; then
            if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
              echo "Tag releases require GOOGLE_MACOS_CLIENT_ID and GOOGLE_MACOS_REVERSED_CLIENT_ID secrets." >&2
              exit 1
            fi
            echo "Google OAuth release secrets not configured; continuing with blank defaults."
            exit 0
          fi

          cat > Configuration/GoogleOAuth.local.xcconfig <<EOF
          GOOGLE_MACOS_CLIENT_ID = $GOOGLE_MACOS_CLIENT_ID
          GOOGLE_MACOS_REVERSED_CLIENT_ID = $GOOGLE_MACOS_REVERSED_CLIENT_ID
          GOOGLE_MAPS_EMBED_API_KEY = $GOOGLE_MAPS_EMBED_API_KEY
          EOF

      - name: Import Developer ID certificate
        env:
          MACOS_DEVELOPER_ID_P12_BASE64: ${{ secrets.MACOS_DEVELOPER_ID_P12_BASE64 }}
          MACOS_DEVELOPER_ID_P12_PASSWORD: ${{ secrets.MACOS_DEVELOPER_ID_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [[ -z "$MACOS_DEVELOPER_ID_P12_BASE64" ]]; then
            echo "No Developer ID certificate configured; building unsigned DMG."
            exit 0
          fi

          KEYCHAIN_PASSWORD="${KEYCHAIN_PASSWORD:-temporary-release-keychain-password}"
          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/release-signing.keychain-db"

          echo "$MACOS_DEVELOPER_ID_P12_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$MACOS_DEVELOPER_ID_P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Build DMG
        env:
          CODE_SIGN_IDENTITY: ${{ secrets.MACOS_DEVELOPER_ID_APPLICATION }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_SPECIFIC_PASSWORD: ${{ secrets.APP_SPECIFIC_PASSWORD }}
          NOTARIZE: ${{ secrets.NOTARIZE_MACOS_DMG }}
          REQUIRE_GOOGLE_OAUTH_FOR_RELEASE: ${{ startsWith(github.ref, 'refs/tags/v') && '1' || '0' }}
        run: scripts/package-macos-dmg.sh

      - name: Create latest-download DMG alias
        run: |
          VERSIONED_DMG=$(find build/apple -maxdepth 1 -type f -name 'HotCrossBuns-*-macOS.dmg' | head -n 1 || true)
          if [[ -z "$VERSIONED_DMG" ]]; then
            echo "Versioned DMG not found in build/apple" >&2
            exit 1
          fi
          cp "$VERSIONED_DMG" build/apple/HotCrossBuns-macOS.dmg

      - name: Smoke test packaged app
        run: |
          VERSIONED_DMG=$(find build/apple -maxdepth 1 -type f -name 'HotCrossBuns-*-macOS.dmg' | head -n 1 || true)
          if [[ -z "$VERSIONED_DMG" ]]; then
            echo "Versioned DMG not found in build/apple" >&2
            exit 1
          fi
          bash scripts/smoke-test-dmg.sh "$VERSIONED_DMG"

      - name: Generate SHA-256 checksums
        run: |
          for artifact in build/apple/*.dmg; do
            shasum -a 256 "$artifact" | awk '{print $1}' > "${artifact}.sha256"
          done

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: HotCrossBuns-macOS-artifacts
          path: |
            build/apple/*.dmg
            build/apple/*.sha256
          if-no-files-found: error

      - name: Attach DMG to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/apple/*.dmg
            build/apple/*.sha256
          generate_release_notes: true
