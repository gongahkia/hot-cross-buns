name: Linux AppImage Preview Validation

on:
  workflow_dispatch:

concurrency:
  group: linux-preview-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  CSC_IDENTITY_AUTO_DISCOVERY: false
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  linux-preview:
    name: AppImage package and runtime smoke
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install Linux runtime dependencies
        run: |
          sudo apt-get update
          if apt-cache show libfuse2t64 >/dev/null 2>&1; then
            sudo apt-get install -y xvfb libfuse2t64 dbus-x11 gnome-keyring libsecret-1-0 libsecret-tools
          else
            sudo apt-get install -y xvfb libfuse2 dbus-x11 gnome-keyring libsecret-1-0 libsecret-tools
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: HCB CLI MCP smoke on Linux
        run: pnpm hcb:smoke

      - name: Build Linux preview AppImage
        run: pnpm release:linux:preview

      - name: Verify Linux AppImage checksums
        run: |
          cd release
          sha256sum -c SHASUMS256.txt

      - name: Smoke Linux AppImage metadata
        run: pnpm release:smoke-appimage

      - name: Smoke Linux AppImage launch
        env:
          HCB_APPIMAGE_SMOKE_LAUNCH: "1"
          HCB_APPIMAGE_SMOKE_NO_SANDBOX: "1"
        run: xvfb-run -a pnpm release:smoke-appimage

      - name: Smoke Linux AppImage MCP
        env:
          HCB_APPIMAGE_SMOKE_LAUNCH: "1"
          HCB_APPIMAGE_SMOKE_NO_SANDBOX: "1"
          HCB_APPIMAGE_SMOKE_PASSWORD_STORE: "gnome-libsecret"
          HCB_PACKAGED_MCP_SMOKE: "1"
        run: |
          dbus-run-session -- bash -lc '
            set -euo pipefail
            keyring_env="$(printf "\n" | gnome-keyring-daemon --unlock --components=secrets || true)"
            if [ -n "$keyring_env" ]; then
              eval "$(printf "%s\n" "$keyring_env" | sed "s/^/export /")"
            fi
            printf "hcb-ci-secret\n" | secret-tool store --label="hcb-ci-secret-service-smoke" hcb ci
            test "$(secret-tool lookup hcb ci)" = "hcb-ci-secret"
            xvfb-run -a pnpm release:smoke-appimage
          '

      - name: Electron smoke on Linux
        run: xvfb-run -a pnpm test:smoke

      - name: Performance smoke on Linux
        env:
          HCB_PERF_REQUIRE_ELECTRON: "1"
        run: xvfb-run -a pnpm test:perf

      - name: Generate Linux manual QA evidence template
        run: pnpm qa:evidence -- --target linux --dir release

      - name: Verify Linux preview artifact bundle
        run: pnpm release:artifact-bundle -- --target linux --dir .

      - name: Upload Linux preview artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linux-preview-artifacts-${{ github.run_id }}
          if-no-files-found: ignore
          compression-level: 0
          retention-days: 14
          path: |
            release/*.AppImage
            release/*.sha256
            release/SHASUMS256.txt
            release/*.blockmap
            release/*.yml
            artifacts/manual-qa/**
            artifacts/release/**
            artifacts/perf/**
            output/playwright/**
            test-results/**
            playwright-report/**
