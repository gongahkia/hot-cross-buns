name: Hot Cross Buns CI on push

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repo-hygiene:
    name: Repository Hygiene
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Verify legacy Go sync server is removed
        run: |
          test ! -d services/server
          test ! -f docker-compose.yml
          ! grep -R "services/server" README.md docs
