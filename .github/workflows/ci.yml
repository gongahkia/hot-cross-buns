name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -----------------------------------------------------------------------
  # Server (Go) tests
  # -----------------------------------------------------------------------
  server-test:
    name: Server Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: tickclone_test
          POSTGRES_USER: tickclone
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tickclone"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: services/server

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: services/server/go.mod

      - name: Run Go tests
        env:
          DATABASE_URL: postgres://tickclone:testpass@localhost:5432/tickclone_test?sslmode=disable
        run: go test -v -race -count=1 ./...

  # -----------------------------------------------------------------------
  # Desktop (Svelte / Vitest) tests
  # -----------------------------------------------------------------------
  tauri-test:
    name: Desktop Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/desktop

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: npx vitest run --reporter=verbose
