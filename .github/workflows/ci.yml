name: Hot Cross Buns CI/CD on push

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repo-hygiene:
    name: Repository Hygiene
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Verify legacy Go sync server is removed
        run: |
          test ! -d services/server
          test ! -f docker-compose.yml
          ! grep -R "services/server" README.md docs

  apple-build:
    name: Apple macOS Build
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: apps/apple
        run: xcodegen generate

      - name: Build macOS target
        working-directory: apps/apple
        run: xcodebuild -project HotCrossBuns.xcodeproj -scheme HotCrossBunsMac -destination 'platform=macOS' build CODE_SIGNING_ALLOWED=NO

      - name: Run macOS tests
        working-directory: apps/apple
        run: xcodebuild -project HotCrossBuns.xcodeproj -scheme HotCrossBunsMac -destination 'platform=macOS' test CODE_SIGNING_ALLOWED=NO
