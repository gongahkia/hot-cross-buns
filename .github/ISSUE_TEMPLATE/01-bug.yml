name: Bug report
description: Report a reproducible app bug.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Do not include credentials, tokens, local databases, raw Google payloads, or unredacted diagnostics.
        Security reports belong in SECURITY.md, not public issues.
  - type: input
    id: version
    attributes:
      label: App version
      placeholder: "5.0.0"
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS
        - Linux
        - Windows
        - source/dev
    validations:
      required: true
  - type: input
    id: os-version
    attributes:
      label: OS version
      placeholder: "macOS 14.6, Ubuntu 26.04, Windows 11 25H2"
    validations:
      required: true
  - type: dropdown
    id: install-source
    attributes:
      label: Install source
      options:
        - DMG
        - AppImage
        - NSIS
        - source
        - other
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Redacted logs or screenshots
      description: Remove secrets, tokens, local database contents, account identifiers, and raw Google payloads.
    validations:
      required: false
