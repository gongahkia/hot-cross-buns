name: Docs or website issue
description: Report inaccurate, missing, or confusing docs/site content.
title: "[Docs]: "
labels: ["documentation"]
body:
  - type: input
    id: location
    attributes:
      label: Page or file
      placeholder: "README.md, docs/index.html, docs/support/linux-preview-support.md"
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: Problem
      description: What is wrong, missing, or unclear?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Suggested correction
    validations:
      required: false
