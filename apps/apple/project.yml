name: HotCrossBuns
options:
  bundleIdPrefix: com.gongahkia
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
configFiles:
  Debug: Configuration/GoogleOAuth.xcconfig
  Release: Configuration/GoogleOAuth.xcconfig
settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: "Q2J4QWZLR7"
    CURRENT_PROJECT_VERSION: "1"
    MARKETING_VERSION: "0.1.0"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    ENABLE_HARDENED_RUNTIME: YES
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    # Xcode 16+ clang compilation cache. 5-14% faster clean builds on
    # measured projects; the benefit compounds on branch switching, post-
    # pull rebuilds, and CI with persistent DerivedData. Reversible —
    # delete this line + regen to opt out.
    COMPILATION_CACHE_ENABLE_CACHING: YES
packages:
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: 9.1.0
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.6.0
targets:
  HotCrossBunsMac:
    type: application
    platform: macOS
    dependencies:
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: GoogleSignIn
        product: GoogleSignInSwift
      - package: Sparkle
        product: Sparkle
      - target: HotCrossBunsShareExtension
        embed: true
        codeSign: true
    sources:
      - path: HotCrossBuns
        excludes:
          - Support/Info-macOS.plist
          - Support/HotCrossBuns.entitlements
      - path: Resources
        buildPhase: resources
    info:
      path: HotCrossBuns/Support/Info-macOS.plist
      properties:
        CFBundleName: Hot Cross Buns
        CFBundleDisplayName: Hot Cross Buns
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        GIDClientID: $(GOOGLE_MACOS_CLIENT_ID)
        GoogleMapsEmbedAPIKey: $(GOOGLE_MAPS_EMBED_API_KEY)
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLName: com.gongahkia.hotcrossbuns.google-oauth
            CFBundleURLSchemes:
              - $(GOOGLE_MACOS_REVERSED_CLIENT_ID)
          - CFBundleTypeRole: Editor
            CFBundleURLName: com.gongahkia.hotcrossbuns.deeplink
            CFBundleURLSchemes:
              - hotcrossbuns
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        CFBundleDevelopmentRegion: en
        NSHumanReadableCopyright: Copyright 2026 Gongahkia
        NSServices:
          - NSMenuItem:
              default: Create Hot Cross Buns task
            NSMessage: handleCreateTaskService
            NSPortName: Hot Cross Buns
            NSSendTypes:
              - public.utf8-plain-text
            NSReturnTypes: []
    settings:
      base:
        PRODUCT_NAME: Hot Cross Buns
        PRODUCT_MODULE_NAME: HotCrossBunsMac
        PRODUCT_BUNDLE_IDENTIFIER: com.gongahkia.hotcrossbuns.mac
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: HotCrossBuns/Support/HotCrossBuns.entitlements
    scheme:
      testTargets:
        - HotCrossBunsMacTests
  HotCrossBunsShareExtension:
    type: app-extension
    platform: macOS
    sources:
      - path: HotCrossBunsShareExtension
        excludes:
          - Info.plist
          - HotCrossBunsShareExtension.entitlements
    info:
      path: HotCrossBunsShareExtension/Info.plist
      properties:
        CFBundleDisplayName: Hot Cross Buns
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsText: true
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsWebPageWithMaxCount: 1
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gongahkia.hotcrossbuns.mac.share
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: HotCrossBunsShareExtension/HotCrossBunsShareExtension.entitlements
        INFOPLIST_KEY_CFBundleDisplayName: Hot Cross Buns
  HotCrossBunsMacTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: HotCrossBunsMacTests
    dependencies:
      - target: HotCrossBunsMac
    settings:
      base:
        BUNDLE_LOADER: $(TEST_HOST)
        PRODUCT_BUNDLE_IDENTIFIER: com.gongahkia.hotcrossbuns.mac.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Hot Cross Buns.app/Contents/MacOS/Hot Cross Buns"
