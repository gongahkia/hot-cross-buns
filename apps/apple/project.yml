name: HotCrossBuns
options:
  bundleIdPrefix: com.gongahkia
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CURRENT_PROJECT_VERSION: "1"
    MARKETING_VERSION: "0.1.0"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    GOOGLE_IOS_CLIENT_ID: ""
    GOOGLE_IOS_REVERSED_CLIENT_ID: ""
    GOOGLE_MACOS_CLIENT_ID: ""
    GOOGLE_MACOS_REVERSED_CLIENT_ID: ""
packages:
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: 9.1.0
targets:
  HotCrossBuns:
    type: application
    platform: iOS
    dependencies:
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: GoogleSignIn
        product: GoogleSignInSwift
    sources:
      - path: HotCrossBuns
        excludes:
          - Support/Info-iOS.plist
          - Support/Info-macOS.plist
    resources:
      - path: Resources
    info:
      path: HotCrossBuns/Support/Info-iOS.plist
      properties:
        CFBundleDisplayName: Hot Cross Buns
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        GIDClientID: $(GOOGLE_IOS_CLIENT_ID)
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLSchemes:
              - $(GOOGLE_IOS_REVERSED_CLIENT_ID)
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gongahkia.hotcrossbuns
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
    scheme:
      testTargets: []
  HotCrossBunsMac:
    type: application
    platform: macOS
    dependencies:
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: GoogleSignIn
        product: GoogleSignInSwift
    sources:
      - path: HotCrossBuns
        excludes:
          - Support/Info-iOS.plist
          - Support/Info-macOS.plist
    resources:
      - path: Resources
    info:
      path: HotCrossBuns/Support/Info-macOS.plist
      properties:
        CFBundleDisplayName: Hot Cross Buns
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        GIDClientID: $(GOOGLE_MACOS_CLIENT_ID)
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLSchemes:
              - $(GOOGLE_MACOS_REVERSED_CLIENT_ID)
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        NSHumanReadableCopyright: Copyright 2026 Gongahkia
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gongahkia.hotcrossbuns.mac
        CODE_SIGN_STYLE: Automatic
    scheme:
      testTargets:
        - HotCrossBunsMacTests
  HotCrossBunsMacTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: HotCrossBunsMacTests
    dependencies:
      - target: HotCrossBunsMac
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gongahkia.hotcrossbuns.mac.tests
