name: HotCrossBuns
options:
  bundleIdPrefix: com.gongahkia
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CURRENT_PROJECT_VERSION: "1"
    MARKETING_VERSION: "0.1.0"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
targets:
  HotCrossBuns:
    type: application
    platform: iOS
    sources:
      - path: HotCrossBuns
        excludes:
          - Support/Info-iOS.plist
          - Support/Info-macOS.plist
    resources:
      - path: Resources
    info:
      path: HotCrossBuns/Support/Info-iOS.plist
      properties:
        CFBundleDisplayName: Hot Cross Buns
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gongahkia.hotcrossbuns
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
    scheme:
      testTargets: []
  HotCrossBunsMac:
    type: application
    platform: macOS
    sources:
      - path: HotCrossBuns
        excludes:
          - Support/Info-iOS.plist
          - Support/Info-macOS.plist
    resources:
      - path: Resources
    info:
      path: HotCrossBuns/Support/Info-macOS.plist
      properties:
        CFBundleDisplayName: Hot Cross Buns
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        NSHumanReadableCopyright: Copyright 2026 Gongahkia
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gongahkia.hotcrossbuns.mac
        CODE_SIGN_STYLE: Automatic
    scheme:
      testTargets: []
