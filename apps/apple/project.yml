name: HotCrossBuns
options:
  bundleIdPrefix: com.gongahkia
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CURRENT_PROJECT_VERSION: "1"
    MARKETING_VERSION: "0.1.0"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    ENABLE_HARDENED_RUNTIME: YES
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    GOOGLE_MACOS_CLIENT_ID: ""
    GOOGLE_MACOS_REVERSED_CLIENT_ID: ""
packages:
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: 9.1.0
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.6.0
targets:
  HotCrossBunsMac:
    type: application
    platform: macOS
    dependencies:
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: GoogleSignIn
        product: GoogleSignInSwift
      - package: Sparkle
        product: Sparkle
      - target: HotCrossBunsShareExtension
        embed: true
        codeSign: true
    sources:
      - path: HotCrossBuns
        excludes:
          - Support/Info-macOS.plist
          - Support/HotCrossBuns.entitlements
    resources:
      - path: Resources
    info:
      path: HotCrossBuns/Support/Info-macOS.plist
      properties:
        CFBundleDisplayName: Hot Cross Buns
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        GIDClientID: $(GOOGLE_MACOS_CLIENT_ID)
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLSchemes:
              - $(GOOGLE_MACOS_REVERSED_CLIENT_ID)
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        NSHumanReadableCopyright: Copyright 2026 Gongahkia
        SUFeedURL: https://gongahkia.github.io/hot-cross-buns/appcast.xml
        SUEnableAutomaticChecks: true
        NSServices:
          - NSMenuItem:
              default: Create Hot Cross Buns task
            NSMessage: handleCreateTaskService
            NSPortName: Hot Cross Buns
            NSSendTypes:
              - public.utf8-plain-text
            NSReturnTypes: []
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gongahkia.hotcrossbuns.mac
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: HotCrossBuns/Support/HotCrossBuns.entitlements
    scheme:
      testTargets:
        - HotCrossBunsMacTests
  HotCrossBunsShareExtension:
    type: app-extension
    platform: macOS
    sources:
      - path: HotCrossBunsShareExtension
        excludes:
          - Info.plist
          - HotCrossBunsShareExtension.entitlements
    info:
      path: HotCrossBunsShareExtension/Info.plist
      properties:
        CFBundleDisplayName: Hot Cross Buns
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsText: true
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsWebPageWithMaxCount: 1
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gongahkia.hotcrossbuns.mac.share
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: HotCrossBunsShareExtension/HotCrossBunsShareExtension.entitlements
        INFOPLIST_KEY_CFBundleDisplayName: Hot Cross Buns
  HotCrossBunsMacTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: HotCrossBunsMacTests
    dependencies:
      - target: HotCrossBunsMac
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gongahkia.hotcrossbuns.mac.tests
